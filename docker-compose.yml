version: "3.9"

# ── Local development stack ────────────────────────────────────────────────────
# Usage:
#   docker compose up -d          # start postgres
#   mvn spring-boot:run -Pdev     # start the app with dev profile
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:18-alpine
    container_name: spring-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       appdb_dev
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql   # trước là /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── (Optional) pgAdmin ───────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spring-app-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    container_name: spring-app-main
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy # Chờ Postgres khởi động xong mới chạy App
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/appdb_dev
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres

volumes:
  postgres_data:
