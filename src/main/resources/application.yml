spring:
  application:
    name: spring-app

  # ── DataSource (PostgreSQL 17) ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:appdb_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-main
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # ddl-auto: validate          # use Flyway / Liquibase in prod; 'update' for dev
      ddl-auto: update          # use Flyway / Liquibase in prod; 'update' for dev
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    user:
      name: admin          # overridden by DB users at runtime
      password: changeme

# ── Server (Tomcat 10.x embedded) ───────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    connection-timeout: 20000
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── Application-specific ────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongAndSecureSecretKeyForJWT2024!@#$}
    expiration-ms: 86400000   # 24 h
    refresh-expiration-ms: 604800000  # 7 days

  lucene:
    index-path: ${LUCENE_INDEX_PATH:./lucene-index}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
